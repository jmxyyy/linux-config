"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

format = """
[Ôò¡ÔöÇ]()\
$os\
$directory\
$git_branch\
$git_status\
$fill\

$cpp\
$python\
$rust\
$go\
$zig\
$bun\
$nodejs\

$sudo\
$status\
$line_break\
[Ôò░ÔöÇ]()\
$character\
"""
add_newline = true

[os]
format = '[$symbol ]($style)'
style = 'bold blue'
disabled = false

[os.symbols]
Alpine = '´îÇ'
Amazon = '´ë░'
Android = '¯£Ä'
Arch = '¾░úç'
CentOS = '´îä'
Debian = '´îå'
EndeavourOS = '´îó'
Fedora = '´îè'
FreeBSD = '´îî'
Garuda = '´à╝'
Gentoo = '´îì'
Linux = '´à╝'
Macos = '´îé'
Manjaro = '´îÆ'
Mariner = '´à╝'
Mint = '´îÄ'
NetBSD = '´à╝'
NixOS = '´îô'
OpenBSD = '´î¿'
OpenCloudOS = '¯«¬'
openEuler = '´à╝'
openSUSE = '´îö'
OracleLinux = 'ÔèéÔèâ'
Pop = '´î¬'
Raspbian = '´îò'
Redhat = '´îû'
RedHatEnterprise = '´îû'
Solus = '´î¡'
SUSE = '´îö'
Ubuntu = '´îø'
Unknown = '´äê'
Windows = '¯£Å'

[directory]
# ´ü╝  ­ƒôé ´ü╗  ´ü╝  |
# format = '[´üí $path]($style)[$read_only]($read_only_style) '
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold peach'
read_only_style = 'red'
home_symbol = "~"
truncation_symbol = 'ÔÇª/'
truncation_length = 5
read_only = ' ¾░î¥'
use_os_path_sep = true
#fish_style_pwd_dir_length = 1
truncate_to_repo = true

[git_branch]
format = """
[$symbol $branch]($style)\
[(:$remote_name/$remote_branch)]($style)\
"""
#  ´Éù   ´ÉÖ  ´Éÿ  ´æ┐  ´çô  ¯éá  |
symbol = '¯£Ñ'
style = 'bold mauve'
always_show_remote = true
disabled = false

[git_status]
format = '([\[$all_status$ahead_behind\]]($style)) '
style = 'bold red'
# untracked:'?'; staged:'+'; modified:'!'; deleted:'x';
#windows_starship = '/mnt/c/Users/username/scoop/apps/starship/current/starship.exe'

[fill]
symbol = ' '
style = 'bright-black'
disabled = true

[status]
# '[\[$symbol$common_meaning$signal_name$maybe_int\]]($style) '
format = '$symbol'
symbol = '[ÔùÅ\($status\)](bright-red) '
# success_symbol = '[ÔùÅ](green) '
not_executable_symbol = '[Ôî¢\($status\)](bright-red) '
not_found_symbol = '[ÔùÄ\($status\)](bright-red) '
sigint_symbol = '[Ô£Â\($status\)](bright-red) '
signal_symbol = '[Ô£ò\($status\)](bright-red) '
recognize_signal_code = true
map_symbol = true
disabled = false

[cmd_duration] #  ´âº  ´äÉ  ´ëÆ  |
format = '[´ëÆ ](bright-red)[$duration]($style) '
style = 'bold yellow'
min_time = 2000
show_milliseconds = false
disabled = true

[python]
format = '[¯£╝ ](bold green)[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
symbol = '' # ¾░îá  ­ƒÉì ­ƒæ¥  |
style = 'bold yellow'
# detect_files = [['.python-version', '__init__.py', 'pyproject.toml', 'requirements.txt', 'setup.py', 'pixi.toml']]
version_format = '${major}.${minor}'
disabled = false

[cpp]
format = '[¯ÿØ ](bold green)[$name$version]($style) '
symbol = '' # ¯ÿ×  ¯Öë |
style = 'bold yellow'
detect_extensions = ['c', 'h', 'hpp', 'cpp', 'cppm']
commands = [['g++', '--version'], ['clang++', '--version']]
version_format = '${major}.${minor}'
disabled = false

[rust]
format = '[¯×¿ ](bold green)[$symbol$version]($style) '
symbol = ''
style = 'bold yellow'
version_format = '${major}.${minor}'
disabled = false

[bun]
format = '[¯ëù ](bold green)[$symbol($version)]($style) '
symbol = 'Bun'
style = 'bright-purple'
detect_files = ['bun.lockb', 'bunfig.toml']
version_format = '${major}.${minor}'
disabled = false

[nodejs]
format = '[¯ëù ](bold green)[$symbol($version)]($style) '
symbol = 'Node'
style = 'bright-purple'
#detect_extensions = []
detect_files = ['package.json', '.node-version', '.nvmrc']
detect_folders = ['node_modules']
not_capable_style = 'red'
version_format = '${major}.${minor}'
disabled = false

[java]
# ÔÜ░´©Ä ÔÖ▓ Ôç× ÔÜò´©Ä ÔÿÑ ┬║ ¯ë┐  ¯èå  ´êÄ  ´å¬  ¯Áå  ´çÉ   ¯©¿  ¯║¿  ´åà  ¯║ø  ¯ë«  ¯ëê  ¯ëù  ¯ê»  ¯ëå  ¯èï |
format = '[¯ëù ](bold green)[${symbol}(${version} )]($style)'
symbol = 'Java'
style = 'bright-purple'
detect_extensions = ['java', 'class', 'gradle', 'jar', 'cljs', 'cljc']
detect_files = ['pom.xml', 'build.gradle.kts', 'build.sbt', '.java-version', 'deps.edn', 'project.clj', 'build.boot', '.sdkmanrc']
version_format = '${major}.${minor}'
disabled = true

[sudo]
# ´âº  ´àò ´éä  ´çÉ  ¯¢ñ   |
format = '[$symbol]($style)'
symbol = '´âº '
style = 'bold 9'
allow_windows = false
disabled = true

[time]
#  ­ƒòÖ ´åÿ  ´ë¿  ¯©¿  ´çÉ  ´Çù  ¯║¿  ¯èÄ  ¯Áå  ¯║Ö |
format = '[´Çù ](bold 248)[$time]($style) '
style = 'bold bright-cyan'
time_format = '%H:%M'
use_12hr = false
disabled = false

[shell] #  ¯»à ´Æë  ¯Üæ ´æá_ |
format = '[´Æë ](bold 248)[$indicator]($style) '
style = 'bold bright-blue'
unknown_indicator = 'shell'
powershell_indicator = 'powershell'
fish_indicator = 'fish'
bash_indicator = 'bash'
zsh_indicator = 'zsh'
disabled = false

[username]
# ´Éò  ´ïÇ  ¯┤Á  ´Çç  ¯┤Á  |
format = '[](bold 248)[$user]($style)'
style_user = 'bold yellow'
style_root = 'bold red'
show_always = true

[hostname]
format = '[([´âé ]($style)$hostname)](bold bright-cyan)'
ssh_symbol = '­ƒîÉ ' # ¯¢ï  |
style = 'bold green'
ssh_only = true
trim_at = ''
aliases = { "loganmac.local" = "mac" }
# detect_env_vars = ['!TMUX', 'SSH_CONNECTION']
disabled = false

[character]
format = '$symbol '
#success_symbol = '[´üö](fg:bold light_green)'
#success_symbol = '[Ôÿì](fg:bold light_green)'
#success_symbol = '[Ôÿí](fg:bold light_green)'
success_symbol = '[´äà](bold green)'
error_symbol = '[Ô£ÿ](bold red)'
vimcmd_symbol = '[V](bold green)'

